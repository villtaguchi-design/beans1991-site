name: Deploy to XREA

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.3
        with:
          server: s325.xrea.com
          username: villdesign
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/beans1991.com/
